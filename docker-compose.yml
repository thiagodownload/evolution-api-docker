services:
  evolution-api:
    image: evoapicloud/evolution-api:latest
    ports:
      - "9090:8080"
    environment:
      - PORT=9090
    env_file:
      - .env
    volumes:
      - evo_instances:/evolution/instances
    depends_on:
      - postgres
    restart: always

  postgres:
    image: postgres:16
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=evolution
    volumes:
      - pg_data:/var/lib/postgresql/data
    restart: always

volumes:
  evo_instances:
  pg_data:


